<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio.net URL 分析器 - 电台流媒体提取工具</title>

    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', 'Helvetica Neue', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top Banner Styles */
        .top-banner {
            padding: 40px 40px;
            margin-bottom: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .banner-title {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            font-size: 2.8em;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .banner-subtitle {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            font-size: 1.15em;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 400;
            text-shadow: 0 1px 4px rgba(0,0,0,0.15);
            letter-spacing: 0.3px;
        }

        /* Navigation */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Input Section */
        .input-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .input-section h2 {
            color: #0078d4;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0078d4;
        }

        .btn {
            padding: 15px 30px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            background: #005a9e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #28a745;
        }

        .btn-secondary:hover {
            background: #218838;
        }

        .btn-export {
            background: #17a2b8;
        }

        .btn-export:hover {
            background: #138496;
        }

        /* Example URLs */
        .example-urls {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .example-urls h4 {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .example-urls a {
            display: block;
            color: #0078d4;
            text-decoration: none;
            padding: 5px 0;
            font-size: 0.9em;
        }

        .example-urls a:hover {
            text-decoration: underline;
        }

        /* Status Messages */
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Results Section */
        .results-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-header h2 {
            color: #0078d4;
            font-size: 1.5em;
        }

        .results-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Station List */
        .station-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .station-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }

        .station-card:hover {
            border-color: #0078d4;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .station-card.has-stream {
            border-color: #28a745;
        }

        .station-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .station-logo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #e0e0e0;
        }

        .station-info h3 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        .station-id {
            color: #666;
            font-size: 0.9em;
        }

        .station-stream {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .stream-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .stream-url {
            color: #0078d4;
            word-break: break-all;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .stream-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .stream-status.success {
            background: #d4edda;
            color: #155724;
        }

        .stream-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .stream-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0078d4, #00a4ef);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .banner-title {
                font-size: 2em;
            }

            .station-list {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Banner -->
        <div class="top-banner">
            <h1 class="banner-title">🔍 Radio.net URL 分析器</h1>
            <p class="banner-subtitle">输入任意 radio.net 页面URL，自动提取电台列表和流媒体链接</p>
        </div>

        <!-- Navigation -->
        <div class="nav-links">
            <a href="/">🎵 播放器</a>
            <a href="/scraper">🕷️ 爬虫工具</a>
            <a href="/analyzer">🔍 URL分析器</a>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <h2>📝 输入 Radio.net URL</h2>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="例如: https://www.radio.net/topic/news" />
                <button class="btn" onclick="analyzeURL()">
                    <span id="analyzeButtonText">分析URL</span>
                </button>
            </div>

            <div class="example-urls">
                <h4>📌 示例URL (点击自动填充):</h4>
                <a href="#" onclick="fillExample('https://www.radio.net/topic/news'); return false;">
                    新闻电台页面
                </a>
                <a href="#" onclick="fillExample('https://www.radio.net/top-stations'); return false;">
                    热门电台页面
                </a>
                <a href="#" onclick="fillExample('https://www.radio.net/topic/sports'); return false;">
                    体育电台页面
                </a>
                <a href="#" onclick="fillExample('https://www.radio.net/local/usa'); return false;">
                    美国本地电台
                </a>
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>📡 分析结果 (<span id="stationCount">0</span> 个电台)</h2>
                <div class="results-actions">
                    <button class="btn btn-secondary" onclick="fetchAllStreams()" id="fetchStreamsBtn">
                        获取所有流媒体链接
                    </button>
                    <button class="btn btn-export" onclick="exportJSON()" id="exportBtn">
                        导出 JSON
                    </button>
                    <button class="btn btn-export" onclick="exportM3U()" id="exportM3UBtn">
                        导出 M3U
                    </button>
                </div>
            </div>
            <div id="pageTitle" style="color: #666; margin-bottom: 15px; font-size: 0.95em;"></div>
            <div class="station-list" id="stationList"></div>
        </div>
    </div>

    <script>
        let currentStations = [];
        let currentStreams = {};

        function fillExample(url) {
            document.getElementById('urlInput').value = url;
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }
        }

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = percent + '%';
            progressFill.textContent = `${current}/${total} (${percent}%)`;
        }

        async function analyzeURL() {
            const url = document.getElementById('urlInput').value.trim();

            if (!url) {
                showStatus('请输入URL', 'error');
                return;
            }

            if (!url.includes('radio.net')) {
                showStatus('URL必须来自 radio.net 网站', 'error');
                return;
            }

            const analyzeBtn = document.getElementById('analyzeButtonText');
            analyzeBtn.innerHTML = '<span class="loading-spinner"></span> 分析中...';
            document.querySelector('.btn').disabled = true;

            try {
                const response = await fetch('/api/analyze-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.success) {
                    currentStations = data.stations;
                    currentStreams = {};
                    displayResults(data);
                    showStatus(`成功分析！找到 ${data.station_count} 个电台`, 'success');
                } else {
                    showStatus('分析失败: ' + data.error, 'error');
                }
            } catch (error) {
                showStatus('请求失败: ' + error.message, 'error');
            } finally {
                analyzeBtn.textContent = '分析URL';
                document.querySelector('.btn').disabled = false;
            }
        }

        function displayResults(data) {
            const resultsSection = document.getElementById('resultsSection');
            const stationList = document.getElementById('stationList');
            const stationCount = document.getElementById('stationCount');
            const pageTitle = document.getElementById('pageTitle');

            stationCount.textContent = data.station_count;
            pageTitle.textContent = `📄 页面: ${data.page_title} | 🔗 URL: ${data.url}`;

            stationList.innerHTML = '';

            data.stations.forEach((station, index) => {
                const card = createStationCard(station);
                stationList.appendChild(card);
            });

            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function createStationCard(station) {
            const card = document.createElement('div');
            card.className = 'station-card';
            card.id = `station-${station.id}`;

            const logoHTML = station.logo
                ? `<img src="${station.logo}" alt="${station.name}" class="station-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23e0e0e0%22 width=%2260%22 height=%2260%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2224%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📻%3C/text%3E%3C/svg%3E'">`
                : `<div class="station-logo" style="display: flex; align-items: center; justify-content: center; font-size: 24px;">📻</div>`;

            card.innerHTML = `
                <div class="station-header">
                    ${logoHTML}
                    <div class="station-info">
                        <h3>${station.name}</h3>
                        <div class="station-id">ID: ${station.id}</div>
                    </div>
                </div>
                <div class="station-stream" id="stream-${station.id}">
                    <div class="stream-label">流媒体链接:</div>
                    <span class="stream-status pending">等待获取</span>
                </div>
            `;

            return card;
        }

        async function fetchAllStreams() {
            if (currentStations.length === 0) {
                showStatus('没有可获取的电台', 'error');
                return;
            }

            const fetchBtn = document.getElementById('fetchStreamsBtn');
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<span class="loading-spinner"></span> 获取中...';

            const progressContainer = document.getElementById('progressContainer');
            progressContainer.style.display = 'block';
            updateProgress(0, currentStations.length);

            showStatus('开始批量获取流媒体链接...', 'info');

            let successCount = 0;
            let failCount = 0;

            // 逐个获取流媒体链接
            for (let i = 0; i < currentStations.length; i++) {
                const station = currentStations[i];
                updateProgress(i + 1, currentStations.length);

                try {
                    const response = await fetch(`/api/stream/${station.id}`);
                    const data = await response.json();

                    if (data.success && data.stream_url) {
                        currentStreams[station.id] = data.stream_url;
                        updateStationStream(station.id, data.stream_url, true);
                        successCount++;
                    } else {
                        updateStationStream(station.id, null, false);
                        failCount++;
                    }
                } catch (error) {
                    updateStationStream(station.id, null, false);
                    failCount++;
                }

                // 延迟1秒，避免请求过快
                if (i < currentStations.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }

            fetchBtn.disabled = false;
            fetchBtn.textContent = '重新获取流媒体链接';
            progressContainer.style.display = 'none';
            showStatus(`完成！成功: ${successCount} 个，失败: ${failCount} 个`, 'success');
        }

        function updateStationStream(stationId, streamUrl, success) {
            const streamEl = document.getElementById(`stream-${stationId}`);
            const card = document.getElementById(`station-${stationId}`);

            if (success && streamUrl) {
                streamEl.innerHTML = `
                    <div class="stream-label">流媒体链接:</div>
                    <div class="stream-url">${streamUrl}</div>
                    <span class="stream-status success">✓ 获取成功</span>
                `;
                card.classList.add('has-stream');
            } else {
                streamEl.innerHTML = `
                    <div class="stream-label">流媒体链接:</div>
                    <span class="stream-status error">✗ 获取失败</span>
                `;
            }
        }

        function exportJSON() {
            const exportData = currentStations.map(station => ({
                ...station,
                stream_url: currentStreams[station.id] || null
            }));

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `radio_stations_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            showStatus('JSON文件已导出', 'success');
        }

        function exportM3U() {
            let m3uContent = '#EXTM3U\n';

            currentStations.forEach(station => {
                const streamUrl = currentStreams[station.id];
                if (streamUrl) {
                    m3uContent += `#EXTINF:-1,${station.name}\n`;
                    m3uContent += `${streamUrl}\n`;
                }
            });

            const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `radio_stations_${Date.now()}.m3u`;
            a.click();
            URL.revokeObjectURL(url);

            showStatus('M3U播放列表已导出', 'success');
        }

        // 支持回车键提交
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeURL();
            }
        });
    </script>
</body>
</html>
